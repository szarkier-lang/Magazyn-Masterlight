<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterlight WMS - System Magazynowy</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="loading-screen" class="hidden"><div class="spinner"></div><h2>Synchronizacja danych...</h2></div>

    <div id="auth-screen">
        <div class="auth-box">
            <h2><span class="material-symbols-outlined">highlight</span> MASTERLIGHT</h2>
            <form id="login-form">
                <div class="form-group"><label>Adres E-mail</label><input type="email" id="login-email" required></div>
                <div class="form-group"><label>Hasło</label><input type="password" id="login-password" required></div>
                <button type="submit" id="login-submit-btn" class="btn-primary">Zaloguj bezpiecznie</button>
            </form>
            <p id="login-error" style="color:red; display:none; margin-top:1rem; font-weight:bold;"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <aside class="sidebar">
            <div class="sidebar-logo"><h2>MASTERLIGHT</h2></div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="#" onclick="switchTab('tab-dashboard')" class="nav-item active"><span class="material-symbols-outlined">space_dashboard</span> Dashboard</a></li>
                    <li><a href="#" onclick="switchTab('tab-inventory')" class="nav-item"><span class="material-symbols-outlined">inventory_2</span> Stan Inwentarza</a></li>
                    <li><a href="#" onclick="switchTab('tab-shipments')" class="nav-item"><span class="material-symbols-outlined">local_shipping</span> Wysyłki i Dostawy</a></li>
                    <li><a href="#" onclick="switchTab('tab-components')" class="nav-item"><span class="material-symbols-outlined">electrical_services</span> Komponenty</a></li>
                    <li><a href="#" onclick="switchTab('tab-reports')" class="nav-item"><span class="material-symbols-outlined">precision_manufacturing</span> Produkcja / Przezbrajanie</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1 id="page-title">Magazyn Masterlight</h1>
                <div id="user-info"></div>
            </header>
            
            <div class="content">
                <div id="tab-dashboard" class="tab-content active"></div>
                <div id="tab-inventory" class="tab-content"></div>
                <div id="tab-shipments" class="tab-content"></div>
                <div id="tab-components" class="tab-content"></div>
                <div id="tab-reports" class="tab-content"></div>
            </div>
        </main>
    </div>

    <div id="modal" class="modal"><div class="modal-dialog"><div id="modal-content"></div></div></div>

    <script src="app.js"></script>
</body>
</html>
